server:
  port: 8080

spring:
  application:
    name: cardbowl-backend
  datasource:
    url: jdbc:mysql://localhost:3306/CardBowl?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: root
    password: sujay1439
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: cardbowl-secret-key-change-in-production-minimum-256-bits-long-key
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  file:
    upload-dir: ./uploads
  ai:
    request:
      connect-timeout-ms: 10000
      read-timeout-ms: 90000
       openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
